# SID OS — Automated Alpine Install Answer File
# Used by: setup-alpine -f sid-answers.conf

# Keyboard layout (US)
KEYMAPOPTS="us us"

# Hostname
HOSTNAMEOPTS="sid"

# Network: DHCP on USB tether, no IPv6
INTERFACESOPTS="auto lo
iface lo inet loopback

auto usb0
iface usb0 inet dhcp
iface usb0 inet6 manual
"

# Timezone (change this to your region)
TIMEZONEOPTS="America/Chicago"

# No proxy
PROXYOPTS="none"

# Use first mirror (CDN, auto-selects fastest)
APKREPOSOPTS="-f"

# No extra user account
USEROPTS="none"

# SSH: openssh, root can login with password
SSHDOPTS="openssh"
ROOTSSHKEY="none"

# NTP
NTPOPTS="busybox"

# Disk selection: set to "none" so installer asks during setup
DISKOPTS=none
