name: Build SID OS Live ISO
on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:
jobs:
  build-sid-live:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install build deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq xorriso squashfs-tools syslinux-common grub-pc-bin grub-efi-amd64-bin grub-common wget cpio gzip dosfstools mtools
      
      - name: Build portable tarball
        run: |
          mkdir -p build/output
          bash build/scripts/make-portable.sh build/output
          ls -lh build/output/
      
      - name: Build SID OS Live ISO
        run: |
          bash build/scripts/build-live-iso.sh build/output 2>&1
          ls -lh build/output/
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sid-artifacts
          path: build/output/
