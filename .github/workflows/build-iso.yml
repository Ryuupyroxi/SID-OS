name: Build SID OS Live ISO

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-sid-live:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            xorriso isolinux squashfs-tools \
            wget cpio gzip grub-pc-bin grub-efi

      - name: Build portable tarball
        run: |
          mkdir -p build/output
          chmod +x build/scripts/make-portable.sh
          ./build/scripts/make-portable.sh build/output

      - name: Run test suite
        run: |
          pip install numpy psutil pillow pyyaml requests --quiet
          python3 test_sid.py --verbose

      - name: Build SID OS Live ISO
        run: |
          chmod +x build/scripts/build-live-iso.sh
          ./build/scripts/build-live-iso.sh build/output
          ls -lh build/output/

      - name: Upload ISO as artifact
        uses: actions/upload-artifact@v4
        with:
          name: sid-live-iso
          path: build/output/*.iso

      - name: Upload portable tarball
        uses: actions/upload-artifact@v4
        with:
          name: sid-portable
          path: build/output/*.tar.gz*

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/output/*.iso
            build/output/*.tar.gz
            build/output/*.md5
            build/output/*.sha256
          generate_release_notes: true
          make_latest: true
