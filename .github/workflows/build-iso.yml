name: Build SID OS Portable Release
on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:
jobs:
  build-portable:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install build deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq xorriso squashfs-tools

      - name: Build portable tarball
        run: |
          mkdir -p build/output
          bash build/scripts/make-portable.sh build/output
          ls -lh build/output/
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sid-portable
          path: build/output/
