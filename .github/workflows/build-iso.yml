name: Build SID OS Live ISO

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-sid-live:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            xorriso squashfs-tools syslinux-common \
            grub-pc-bin grub-efi-amd64-bin grub-common \
            wget cpio gzip dosfstools mtools
          sudo apt-get install -y -qq \
            python3-pip python3-numpy python3-psutil python3-pil python3-yaml \
            python3-requests

      - name: Build portable tarball
        run: |
          mkdir -p build/output
          bash build/scripts/make-portable.sh build/output
          ls -lh build/output/

      - name: Run test suite
        run: |
          echo "=== Python version ==="
          python3 --version
          echo "=== Working directory ==="
          pwd
          ls -la
          echo "=== Check deps ==="
          python3 -c "
import sys
print(f'Python {sys.version}')
deps = {'numpy': 'numpy', 'psutil': 'psutil', 'PIL': 'pillow', 'yaml': 'pyyaml', 'requests': 'requests'}
for imp, pkg in deps.items():
    try:
        exec(f'import {imp}')
        print(f'  ✓ {imp}')
    except ImportError:
        print(f'  ✗ {imp} (needs {pkg})')
" 2>&1
          echo "=== Run tests ==="
          python3 -u test_sid.py --verbose 2>&1 || true
          echo "=== Test exit code: $? ==="

      - name: Build SID OS Live ISO
        run: |
          bash build/scripts/build-live-iso.sh build/output
          ls -lh build/output/

      - name: Upload ISO as artifact
        uses: actions/upload-artifact@v4
        with:
          name: sid-live-iso
          path: build/output/*.iso

      - name: Upload portable tarball
        uses: actions/upload-artifact@v4
        with:
          name: sid-portable
          path: build/output/*.tar.gz*

      - name: List release assets
        if: startsWith(github.ref, 'refs/tags/')
        run: ls -lh build/output/

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/output/*.iso
            build/output/*.tar.gz
            build/output/*.md5
            build/output/*.sha256
          generate_release_notes: true
          make_latest: true
