name: Build SID OS ISO
on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build-iso:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install build deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq xorriso squashfs-tools wget cpio gzip
      
      - name: Build portable tarball
        run: |
          mkdir -p build/output
          bash build/scripts/make-portable.sh build/output
      
      - name: Build bootable ISO
        run: |
          bash build/scripts/build-live-iso.sh build/output
          ls -lh build/output/
      
      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: sid-iso
          path: build/output/sid-*.iso
      
      - name: Upload portable tarball
        uses: actions/upload-artifact@v4
        with:
          name: sid-portable
          path: build/output/sid-*.tar.gz

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/output/sid-*.iso
            build/output/sid-*.tar.gz
            build/output/sid-*.sha256
