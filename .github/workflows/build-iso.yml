name: Build SID OS Live ISO

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-sid-live:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build portable tarball
        run: |
          mkdir -p build/output
          bash build/scripts/make-portable.sh build/output
          ls -lh build/output/

      - name: Build ISO with Docker
        run: |
          docker build -f build/docker/Dockerfile.iso -t sid-builder .
          docker run --rm -v $PWD/build/output:/output sid-builder sh -c "cp /*.iso /output/ 2>/dev/null; cp /*.tar.gz* /output/ 2>/dev/null; ls -lh /output/"
          ls -lh build/output/

      - name: Upload ISO as artifact
        uses: actions/upload-artifact@v4
        with:
          name: sid-live-iso
          path: build/output/*.iso

      - name: Upload portable tarball
        uses: actions/upload-artifact@v4
        with:
          name: sid-portable
          path: build/output/*.tar.gz*

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/output/*.iso
            build/output/*.tar.gz
            build/output/*.md5
            build/output/*.sha256
          generate_release_notes: true
          make_latest: true
