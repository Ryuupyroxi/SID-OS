name: Build SID OS Live ISO

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-sid-live:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build portable tarball (native)
        run: |
          mkdir -p build/output
          bash build/scripts/make-portable.sh build/output
          ls -lh build/output/

      - name: Build Alpine base Docker image
        run: |
          cat > /tmp/Dockerfile.iso << 'EOF'
FROM alpine:3.20
RUN apk add --no-cache alpine-base busybox linux-lts python3 py3-pip \
    musl ncurses-libs xorriso squashfs-tools cpio
RUN echo "Container ready"
EOF
          docker build -t sid-alpine-base -f /tmp/Dockerfile.iso .

      - name: Test build-live-iso.sh inside container
        run: |
          docker run --rm -v $PWD:/repo sid-alpine-base sh -c \
            "cd /repo && mkdir -p build/output && bash build/scripts/build-live-iso.sh build/output 2>&1; echo EXIT: \$?"
          ls -lh build/output/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sid-artifacts
          path: build/output/
